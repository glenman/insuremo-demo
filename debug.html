<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API诊断工具</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 { color: #667eea; }
        .test-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .success { border-left-color: #10b981; }
        .error { border-left-color: #ef4444; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover { opacity: 0.9; }
        pre {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
        }
        .config { color: #10b981; }
        .error-msg { color: #ef4444; }
    </style>
</head>
<body>
    <h1>🔍 InsureMO API 诊断工具</h1>
    
    <div class="test-item">
        <h3>📋 当前配置</h3>
        <pre class="config" id="configDisplay"></pre>
    </div>

    <div class="test-item">
        <h3>🌐 测试1: 获取产品列表</h3>
        <button onclick="testProductList()">开始测试</button>
        <pre id="test1Result">等待测试...</pre>
    </div>

    <div class="test-item">
        <h3>🔐 测试2: 验证API Key</h3>
        <button onclick="testAPIKey()">验证Key</button>
        <pre id="test2Result">等待测试...</pre>
    </div>

    <div class="test-item">
        <h3>🌍 测试3: CORS检查</h3>
        <button onclick="testCORS()">检查CORS</button>
        <pre id="test3Result">等待测试...</pre>
    </div>

    <div class="test-item">
        <h3>💻 浏览器信息</h3>
        <pre id="browserInfo"></pre>
    </div>

    <script>
        const CONFIG = {
            BASE_URL: 'https://portal-gw.insuremo.com/platform/api-orchestration-test',
            AUTH_TOKEN: 'MOATkM3zLB-wAfktz6zd7nY5Z3dgTO1N'
        };

        // 显示配置
        document.getElementById('configDisplay').textContent = JSON.stringify({
            BASE_URL: CONFIG.BASE_URL,
            AUTH_TOKEN: CONFIG.AUTH_TOKEN.substring(0, 10) + '...',
            Endpoint: '/v1/flow/EUDemoProductList'
        }, null, 2);

        // 浏览器信息
        document.getElementById('browserInfo').textContent = JSON.stringify({
            UserAgent: navigator.userAgent,
            Platform: navigator.platform,
            Language: navigator.language,
            CookieEnabled: navigator.cookieEnabled
        }, null, 2);

        async function testProductList() {
            const resultDiv = document.getElementById('test1Result');
            resultDiv.textContent = '⏳ 测试中...';

            try {
                const url = `${CONFIG.BASE_URL}/v1/flow/EUDemoProductList`;
                const startTime = Date.now();
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${CONFIG.AUTH_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    mode: 'cors'
                });

                const duration = Date.now() - startTime;
                const data = await response.json();

                resultDiv.innerHTML = `<span class="success">✅ 成功 (${duration}ms)</span>\n` + 
                    JSON.stringify({
                        Status: response.status,
                        Success: data.Success,
                        ProductCount: data.Data?.Products?.length || 0,
                        Products: data.Data?.Products?.map(p => ({
                            Code: p.ProductCode,
                            Name: p.ProductName
                        }))
                    }, null, 2);
                
                resultDiv.parentElement.classList.add('success');
            } catch (error) {
                resultDiv.innerHTML = `<span class="error-msg">❌ 失败</span>\n${error.stack || error.message}`;
                resultDiv.parentElement.classList.add('error');
            }
        }

        async function testAPIKey() {
            const resultDiv = document.getElementById('test2Result');
            resultDiv.textContent = '⏳ 验证中...';

            try {
                const response = await fetch(`${CONFIG.BASE_URL}/v1/flow/EUDemoProductList`, {
                    headers: {
                        'Authorization': `Bearer ${CONFIG.AUTH_TOKEN}`
                    }
                });

                const data = await response.json();
                
                if (data.Success) {
                    resultDiv.innerHTML = `<span class="success">✅ API Key 有效</span>\n` +
                        `Token前缀: ${CONFIG.AUTH_TOKEN.substring(0, 10)}...\n` +
                        `验证时间: ${new Date().toISOString()}`;
                    resultDiv.parentElement.classList.add('success');
                } else {
                    resultDiv.innerHTML = `<span class="error-msg">❌ API Key 无效</span>\n` +
                        JSON.stringify(data.Error, null, 2);
                    resultDiv.parentElement.classList.add('error');
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error-msg">❌ 验证失败</span>\n${error.message}`;
                resultDiv.parentElement.classList.add('error');
            }
        }

        async function testCORS() {
            const resultDiv = document.getElementById('test3Result');
            resultDiv.textContent = '⏳ 检查CORS配置...';

            try {
                // 发送OPTIONS请求检查CORS
                const response = await fetch(`${CONFIG.BASE_URL}/v1/flow/EUDemoProductList`, {
                    method: 'OPTIONS',
                    headers: {
                        'Origin': window.location.origin,
                        'Access-Control-Request-Method': 'GET',
                        'Access-Control-Request-Headers': 'Authorization, Content-Type'
                    }
                });

                const corsHeaders = {
                    'Access-Control-Allow-Origin': response.headers.get('Access-Control-Allow-Origin'),
                    'Access-Control-Allow-Methods': response.headers.get('Access-Control-Allow-Methods'),
                    'Access-Control-Allow-Headers': response.headers.get('Access-Control-Allow-Headers'),
                    'Access-Control-Allow-Credentials': response.headers.get('Access-Control-Allow-Credentials')
                };

                resultDiv.innerHTML = `<span class="success">✅ CORS配置正常</span>\n` +
                    JSON.stringify(corsHeaders, null, 2);
                resultDiv.parentElement.classList.add('success');
            } catch (error) {
                resultDiv.innerHTML = `<span class="error-msg">⚠️ CORS检查失败（可能不支持OPTIONS）</span>\n${error.message}`;
            }
        }

        // 自动运行测试
        window.addEventListener('load', () => {
            setTimeout(() => {
                testProductList();
            }, 500);
        });
    </script>
</body>
</html>
