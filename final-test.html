<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行险测试 - 终极版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .log {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
            margin: 20px 0;
        }
        .log-entry {
            margin: 5px 0;
            padding: 3px 0;
        }
        .log-success { color: #4ec9b0; }
        .log-error { color: #f48771; }
        .log-info { color: #dcdcaa; }
        .btn {
            width: 100%;
            padding: 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 0;
        }
        .btn:hover { background: #0056b3; }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .plan-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin: 15px 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .plan-card:hover {
            border-color: #007bff;
            transform: translateY(-2px);
        }
        .plan-card.selected {
            border-color: #007bff;
            background: #f0f7ff;
        }
        .result {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .result-row:last-child {
            border-bottom: none;
            font-weight: 600;
            color: #007bff;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 旅行险投保测试</h1>

        <div class="log" id="log">
            <div class="log-entry log-info">系统准备就绪</div>
        </div>

        <div id="controls">
            <button class="btn" onclick="runFullTest()">🚀 开始完整测试</button>
        </div>

        <div id="result" style="display:none;"></div>
    </div>

    <script>
        // 配置
        const CONFIG = {
            BASE_URL: 'https://portal-gw.insuremo.com/platform/api-orchestration-test',
            TOKEN: 'MOATbWg4aRISAep86MorzeBulKla18sq',
            PRODUCT_ID: 375604942
        };

        // 日志函数
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        // API调用
        async function callAPI(endpoint, method = 'GET', body = null) {
            const url = `${CONFIG.BASE_URL}${endpoint}`;

            const options = {
                method: method,
                headers: {
                    'Authorization': `Bearer ${CONFIG.TOKEN}`,
                    'Content-Type': 'application/json'
                }
            };

            if (body && method === 'POST') {
                options.body = JSON.stringify(body);
            }

            log(`📡 调用 API: ${method} ${endpoint}`, 'info');

            const response = await fetch(url, options);

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorText}`);
            }

            const result = await response.json();

            if (!result.Success) {
                throw new Error(result.Error?.Message || 'API返回失败');
            }

            return result.Data;
        }

        // 完整测试流程
        async function runFullTest() {
            const btn = document.querySelector('.btn');
            btn.disabled = true;
            btn.textContent = '⏳ 测试中...';

            try {
                // 步骤1: 获取方案列表
                log('📋 步骤1: 获取方案列表', 'info');
                const planData = await callAPI(`/v1/flow/EUDemoPlanList?productId=${CONFIG.PRODUCT_ID}`);

                log(`✅ 成功获取 ${planData.Plans.length} 个方案`, 'success');

                // 步骤2: 选择第一个方案
                const selectedPlan = planData.Plans[0];
                log(`✅ 选择方案: ${selectedPlan.PlanName}`, 'success');

                // 步骤3: 计算保费
                log('💰 步骤2: 计算保费', 'info');

                const calcPayload = {
                    ProductId: CONFIG.PRODUCT_ID,
                    PlanCode: selectedPlan.PlanCode,
                    EffectiveDate: '2026-03-26',
                    ExpiryDate: '2026-04-05',
                    TravelType: 2,
                    TripType: 2,
                    TravelPolicyType: 'INDI',
                    Customer: {
                        Name: 'Test User',
                        Gender: 'M',
                        DateOfBirth: '1990-01-01'
                    },
                    Travelers: [{
                        Name: 'Test User',
                        InsuredAge: 30,
                        Gender: 'M'
                    }]
                };

                const calcResult = await callAPI('/v1/flow/EUDemoTRVL01Calculate', 'POST', calcPayload);

                log(`✅ 保费计算成功: €${calcResult.TotalPremium}`, 'success');

                // 显示结果
                showResult(calcResult, planData.Plans);

                log('🎉 测试完成！所有功能正常', 'success');

            } catch (error) {
                log(`❌ 错误: ${error.message}`, 'error');
                console.error(error);
                btn.disabled = false;
                btn.textContent = '🔄 重新测试';
            }
        }

        function showResult(data, allPlans) {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';

            resultDiv.innerHTML = `
                <h2 style="margin: 20px 0;">✅ 测试成功</h2>

                <h3>所有可用方案 (${allPlans.length}个)</h3>
                ${allPlans.map(plan => `
                    <div class="plan-card ${plan.PlanCode === data.PlanCode ? 'selected' : ''}">
                        <strong>${plan.PlanName}</strong>
                        <p style="color: #666; margin: 5px 0;">${plan.PlanDescription || '全面保障'}</p>
                        <small>保障项目: ${plan.Coverages?.length || 0}项</small>
                    </div>
                `).join('')}

                <h3 style="margin-top: 30px;">选中的方案详情</h3>
                <div class="result">
                    <div class="result-row">
                        <span>方案名称</span>
                        <span>${data.PlanName}</span>
                    </div>
                    <div class="result-row">
                        <span>保障期间</span>
                        <span>${data.EffectiveDate} 至 ${data.ExpiryDate}</span>
                    </div>
                    <div class="result-row">
                        <span>投保人</span>
                        <span>${data.Customer.Name}</span>
                    </div>
                    <div class="result-row">
                        <span>保费</span>
                        <span>€${data.Premium}</span>
                    </div>
                    <div class="result-row">
                        <span>税费</span>
                        <span>€${data.Tax}</span>
                    </div>
                    <div class="result-row">
                        <span>总保费</span>
                        <span>€${data.TotalPremium}</span>
                    </div>
                </div>

                <h3 style="margin-top: 30px;">保障内容 (${data.Coverages.length}项)</h3>
                <div class="result">
                    ${data.Coverages.map(cov => `
                        <div class="result-row">
                            <span>${cov.Name}</span>
                            <span>€${cov.SumInsured.toLocaleString()}</span>
                        </div>
                    `).join('')}
                </div>
            `;

            const btn = document.querySelector('.btn');
            btn.textContent = '🔄 重新测试';
            btn.disabled = false;
        }

        // 页面加载完成
        window.addEventListener('load', () => {
            log('✅ 页面加载完成，点击按钮开始测试', 'success');
        });
    </script>
</body>
</html>
