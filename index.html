<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保险服务平台 - 首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #888;
            font-size: 1.1rem;
        }

        /* 功能模块容器 */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .modules-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 通用卡片样式 */
        .card {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .card h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2 .icon {
            font-size: 2rem;
        }

        /* 查询保单模块 */
        .query-section {
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #b0b0b0;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 查询结果 */
        .query-result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .query-result.show {
            display: block;
        }

        .query-result h3 {
            margin-bottom: 15px;
            color: #667eea;
        }

        .policy-details {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .detail-item {
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .detail-item .label {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .detail-item .value {
            color: #e0e0e0;
            font-size: 1.1rem;
            font-weight: 600;
            word-break: break-all;
        }

        /* 购买产品模块 */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .product-card .product-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .product-card .product-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #e0e0e0;
        }

        .product-card .product-desc {
            color: #888;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .product-card .product-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .product-card .btn-buy {
            width: 100%;
            padding: 12px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid #667eea;
            border-radius: 8px;
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .product-card .btn-buy:hover {
            background: #667eea;
            color: white;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        /* Success badge */
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .status-issued {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-bound {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .status-quotation {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🛡️ 保险服务平台</h1>
            <p>安全、便捷、专业的在线保险服务</p>
        </div>

        <!-- 功能模块 -->
        <div class="modules-grid">
            <!-- 查询保单模块 -->
            <div class="card">
                <h2><span class="icon">🔍</span> 查询保单</h2>
                <div class="query-section">
                    <div class="form-group">
                        <label for="productType">产品类型</label>
                        <select id="productType">
                            <option value="TRVL01">旅行险 (TRVL01)</option>
                            <option value="HOME01">家财险 (HOME01)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="proposalNo">投保单号</label>
                        <input type="text" id="proposalNo" placeholder="请输入投保单号，如：PTRVL010000000279">
                    </div>
                    <button class="btn" onclick="queryPolicy()">查询保单</button>
                    
                    <!-- 查询结果 -->
                    <div class="query-result" id="queryResult">
                        <h3>保单详情</h3>
                        <div id="policyDetails"></div>
                    </div>
                </div>
            </div>

            <!-- 购买产品模块 -->
            <div class="card">
                <h2><span class="icon">🛒</span> 购买产品</h2>
                <div id="productsContainer">
                    <div style="text-align: center; padding: 40px;">
                        <button class="btn" id="loadProductsBtn" onclick="loadProductsWithRetry()" style="max-width: 300px; margin: 0 auto;">
                            🎯 选择产品
                        </button>
                        <p style="color: #666; margin-top: 15px; font-size: 0.9rem;">点击按钮查看可用的保险产品</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API 配置
        const CONFIG = {
            BASE_URL: 'https://portal-gw.insuremo.com/platform/api-orchestration-test',
            AUTH_TOKEN: 'MOATbWg4aRISAep86MorzeBulKla18sq',
            ENDPOINTS: {
                PRODUCT_LIST: '/v1/flow/EUDemoProductList',
                TRVL01_POLICY: '/v1/flow/EUDemoTRVL01Policy',
                HOME01_POLICY: '/v1/flow/EUDemoHOME01Policy'
            }
        };

        // 产品映射（用于跳转）
        const PRODUCT_PAGES = {
            'TRVL01': 'travel-insurance.html',  // 旅行险投保页面
            'HOME01': 'home-insurance.html'  // 家财险投保页面（待创建）
        };

        // 产品图标和描述
        const PRODUCT_INFO = {
            'TRVL01': {
                icon: '✈️',
                name: '旅行险',
                desc: '为您提供全球旅行保障，包括医疗、行李、航班延误等多种保障',
                badge: '热门推荐'
            },
            'HOME01': {
                icon: '🏠',
                name: '家财险',
                desc: '为您的家庭财产提供全面保障，包括房屋、家具、电器等',
                badge: '全面保障'
            }
        };

        // API 调用函数
        async function callAPI(endpoint, method = 'GET', data = null) {
            const url = `${CONFIG.BASE_URL}${endpoint}`;
            const options = {
                method: method,
                headers: {
                    'Authorization': `Bearer ${CONFIG.AUTH_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                mode: 'cors'
            };

            if (data && (method === 'POST' || method === 'PUT')) {
                options.body = JSON.stringify(data);
            }

            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const result = await response.json();
                if (!result.Success) {
                    throw new Error(result.Error?.Message || 'API调用失败');
                }
                return result.Data;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        // 加载产品列表（带重试机制）
        async function loadProductsWithRetry(maxRetries = 3) {
            const container = document.getElementById('productsContainer');
            let retryCount = 0;
            
            // 显示加载状态
            const showLoading = (attempt) => {
                container.innerHTML = `
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>正在加载产品列表...</p>
                        ${attempt > 1 ? `<p style="font-size: 0.85rem; margin-top: 10px;">第 ${attempt} 次尝试</p>` : ''}
                    </div>
                `;
            };
            
            // 尝试加载
            while (retryCount < maxRetries) {
                retryCount++;
                showLoading(retryCount);
                
                try {
                    const data = await callAPIWithTimeout(CONFIG.ENDPOINTS.PRODUCT_LIST, 15000);
                    
                    if (!data.Products || data.Products.length === 0) {
                        container.innerHTML = '<p style="text-align: center; color: #888;">暂无可用产品</p>';
                        return;
                    }

                    // 过滤掉不需要显示的产品
                    const filteredProducts = data.Products.filter(product => {
                        // 不显示 Microsite 产品
                        return !product.ProductName.includes('Microsite');
                    });

                    if (filteredProducts.length === 0) {
                        container.innerHTML = '<p style="text-align: center; color: #888;">暂无可用产品</p>';
                        return;
                    }

                    const productsHTML = filteredProducts.map(product => {
                        const info = PRODUCT_INFO[product.ProductCode] || {
                            icon: '📋',
                            name: product.ProductName,
                            desc: '保险产品',
                            badge: ''
                        };

                        return `
                            <div class="product-card" onclick="buyProduct('${product.ProductCode}')">
                                ${info.badge ? `<span class="product-badge">${info.badge}</span>` : ''}
                                <div class="product-icon">${info.icon}</div>
                                <div class="product-name">${info.name}</div>
                                <div class="product-desc">${info.desc}</div>
                                <button class="btn-buy">立即投保</button>
                            </div>
                        `;
                    }).join('');

                    container.innerHTML = `<div class="products-grid">${productsHTML}</div>`;
                    return; // 成功加载，退出函数
                    
                } catch (error) {
                    console.error(`加载失败 (尝试 ${retryCount}/${maxRetries}):`, error);
                    
                    if (retryCount >= maxRetries) {
                        // 达到最大重试次数，显示错误
                        container.innerHTML = `
                            <div class="error-message">
                                <p>❌ 加载产品列表失败</p>
                                <p style="font-size: 0.9rem; margin-top: 10px; color: #888;">错误信息：${error.message}</p>
                                <p style="font-size: 0.85rem; margin-top: 10px; color: #666;">已尝试 ${maxRetries} 次</p>
                                <button class="btn" style="margin-top: 20px;" onclick="loadProductsWithRetry(3)">🔄 重新加载</button>
                            </div>
                        `;
                    } else {
                        // 等待1秒后重试
                        await new Promise(resolve => setTimeout(resolve, 1000));
                    }
                }
            }
        }

        // 带超时的 API 调用
        async function callAPIWithTimeout(endpoint, timeout = 15000) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeout);
            
            try {
                const url = `${CONFIG.BASE_URL}${endpoint}`;
                const options = {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${CONFIG.AUTH_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    mode: 'cors',
                    signal: controller.signal
                };

                const response = await fetch(url, options);
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const result = await response.json();
                if (!result.Success) {
                    throw new Error(result.Error?.Message || 'API调用失败');
                }
                
                return result.Data;
            } catch (error) {
                clearTimeout(timeoutId);
                
                if (error.name === 'AbortError') {
                    throw new Error('请求超时，请检查网络连接');
                }
                
                throw error;
            }
        }

        // 查询保单
        async function queryPolicy() {
            const productType = document.getElementById('productType').value;
            const proposalNo = document.getElementById('proposalNo').value.trim();

            if (!proposalNo) {
                alert('请输入投保单号');
                return;
            }

            const queryBtn = document.querySelector('.query-section .btn');
            const resultDiv = document.getElementById('queryResult');
            const detailsDiv = document.getElementById('policyDetails');

            try {
                queryBtn.disabled = true;
                queryBtn.textContent = '查询中...';
                resultDiv.classList.remove('show');

                // 根据产品类型选择API端点
                const endpoint = productType === 'TRVL01' 
                    ? `${CONFIG.ENDPOINTS.TRVL01_POLICY}?proposalNo=${proposalNo}`
                    : `${CONFIG.ENDPOINTS.HOME01_POLICY}?proposalNo=${proposalNo}`;

                const policy = await callAPIWithTimeout(endpoint, 15000);

                // 显示结果
                resultDiv.classList.add('show');
                detailsDiv.innerHTML = formatPolicyDetails(policy);

            } catch (error) {
                alert(`查询失败：${error.message}`);
            } finally {
                queryBtn.disabled = false;
                queryBtn.textContent = '查询保单';
            }
        }

        // 状态映射（英文/数字 -> 中文）
        function getStatusText(status) {
            const statusMap = {
                'ISSUED': '已签发',
                'BOUND': '已绑定',
                'QUOTATION': '报价中',
                'CANCELLED': '已取消',
                'EXPIRED': '已过期',
                'PENDING': '待处理',
                // 数字状态码
                '1': '报价中',
                '2': '已绑定',
                '3': '已签发',
                '4': '已取消',
                '5': '已过期'
            };
            return statusMap[status] || status;
        }

        // 格式化日期（只显示年月日）
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            // 如果包含时间，只取日期部分
            const date = dateStr.split('T')[0];
            return date;
        }

        // 个人信息掩码
        function maskInfo(str, type = 'id') {
            if (!str) return '-';
            
            if (type === 'id') {
                // 身份证：显示前3位和后4位
                if (str.length > 7) {
                    return str.substring(0, 3) + '****' + str.substring(str.length - 4);
                }
            } else if (type === 'phone') {
                // 手机号：显示前3位和后4位
                if (str.length > 7) {
                    return str.substring(0, 3) + '****' + str.substring(str.length - 4);
                }
            } else if (type === 'email') {
                // 邮箱：显示前2位和@后的域名
                const parts = str.split('@');
                if (parts.length === 2) {
                    const name = parts[0];
                    const domain = parts[1];
                    const maskedName = name.substring(0, 2) + '***';
                    return maskedName + '@' + domain;
                }
            }
            
            return str;
        }

        // 格式化保单详情
        function formatPolicyDetails(policy) {
            // 调试：打印保单数据
            console.log('保单详情数据：', policy);
            
            const statusClass = {
                'ISSUED': 'status-issued',
                'BOUND': 'status-bound',
                'QUOTATION': 'status-quotation'
            }[policy.Status] || '';

            // 获取产品名称
            const productName = PRODUCT_INFO[policy.ProductCode]?.name || policy.ProductCode || '-';
            
            // 方案名称（尝试多个可能的字段）
            const planName = policy.PlanName || policy.Plan?.PlanName || policy.PlanCode || '-';

            return `
                <div class="policy-details">
                    <div class="detail-item">
                        <div class="label">投保单号</div>
                        <div class="value">${policy.ProposalNo || '-'}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">保单号</div>
                        <div class="value" style="font-weight: 700; font-size: 1.2rem; color: #667eea;">${policy.PolicyNo || '-'}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">状态</div>
                        <div class="value">
                            <span class="status-badge ${statusClass}">${getStatusText(policy.Status)}</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div class="label">保费</div>
                        <div class="value">${policy.TotalPremium || policy.Premium || 0} ${policy.Currency || 'EUR'}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">产品名称</div>
                        <div class="value">${productName}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">购买方案</div>
                        <div class="value">${planName}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">生效日期</div>
                        <div class="value">${formatDate(policy.EffectiveDate)}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">到期日期</div>
                        <div class="value">${formatDate(policy.ExpiryDate)}</div>
                    </div>
                    ${policy.Customer ? `
                    <div class="detail-item">
                        <div class="label">投保人姓名</div>
                        <div class="value">${policy.Customer.Name || '-'}</div>
                    </div>
                    ${policy.Customer.IdNo ? `
                    <div class="detail-item">
                        <div class="label">身份证号</div>
                        <div class="value">${maskInfo(policy.Customer.IdNo, 'id')}</div>
                    </div>
                    ` : ''}
                    ${policy.Customer.Mobile ? `
                    <div class="detail-item">
                        <div class="label">联系电话</div>
                        <div class="value">${maskInfo(policy.Customer.Mobile, 'phone')}</div>
                    </div>
                    ` : ''}
                    ${policy.Customer.Email ? `
                    <div class="detail-item">
                        <div class="label">电子邮箱</div>
                        <div class="value">${maskInfo(policy.Customer.Email, 'email')}</div>
                    </div>
                    ` : ''}
                    ` : ''}
                </div>
            `;
        }

        // 购买产品
        function buyProduct(productCode) {
            const targetPage = PRODUCT_PAGES[productCode];
            if (targetPage) {
                window.location.href = targetPage;
            } else {
                alert('该产品页面正在开发中，敬请期待！');
            }
        }

        // 页面加载时初始化（不自动加载产品）
        document.addEventListener('DOMContentLoaded', () => {
            // 产品列表需要用户手动点击按钮加载
        });
    </script>
</body>
</html>
