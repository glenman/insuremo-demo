<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球旅行险投保平台 - 暗黑版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        /* 进度条 */
        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1;
        }

        .step-item {
            text-align: center;
            position: relative;
            z-index: 2;
            flex: 1;
        }

        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-weight: 600;
            transition: all 0.3s;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .step-item.active .step-circle {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .step-item.completed .step-circle {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }

        .step-label {
            font-size: 12px;
            color: #666;
        }

        .step-item.active .step-label {
            color: #667eea;
            font-weight: 600;
        }

        /* 步骤容器 */
        .step-container {
            display: none;
            animation: fadeIn 0.5s;
        }

        .step-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 表单样式 */
        .form-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-section h3 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: 500;
            color: #bbb;
            font-size: 0.9rem;
        }

        .form-group label .required {
            color: #ef4444;
            margin-left: 4px;
        }

        input, select {
            padding: 12px 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #e0e0e0;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        input::placeholder {
            color: #666;
        }

        /* 方案卡片 */
        .plans-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .plan-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .plan-card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .plan-card.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.4);
        }

        .plan-card h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #667eea;
        }

        .plan-card .coverage-count {
            color: #10b981;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .plan-card .coverage-list {
            color: #888;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* 按钮 */
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        /* 报价摘要 */
        .quotation-summary {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 30px;
            margin-top: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .summary-row:last-child {
            border-bottom: none;
        }

        .summary-row.total {
            font-size: 1.3rem;
            font-weight: 700;
            color: #667eea;
            margin-top: 10px;
            padding-top: 20px;
            border-top: 2px solid rgba(102, 126, 234, 0.3);
        }

        /* API日志 */
        .api-log {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-success { color: #10b981; }
        .log-error { color: #ef4444; }
        .log-info { color: #667eea; }
        .log-warn { color: #f59e0b; }

        /* 成功页面 */
        .success-page {
            text-align: center;
            padding: 60px 20px;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 30px;
        }

        .policy-info {
            background: rgba(102, 126, 234, 0.1);
            border: 2px solid #667eea;
            border-radius: 12px;
            padding: 30px;
            margin-top: 30px;
            display: inline-block;
        }

        .policy-info p {
            margin: 10px 0;
            font-size: 1.1rem;
        }

        .policy-no {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
            margin-top: 15px;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .progress-bar {
                font-size: 0.8rem;
            }

            .step-circle {
                width: 30px;
                height: 30px;
                font-size: 0.9rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }
        }

        /* 产品信息展示 */
        .product-info {
            background: rgba(102, 126, 234, 0.1);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-info .label {
            color: #888;
            font-size: 0.9rem;
        }

        .product-info .value {
            color: #667eea;
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* 保费展示 */
        .premium-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            color: white;
            margin: 20px 0;
        }

        .premium-display .amount {
            font-size: 3rem;
            font-weight: 700;
            margin: 10px 0;
        }

        .premium-display .currency {
            font-size: 1.2rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✈️ 全球旅行险投保平台</h1>
        <p class="subtitle">InsureMO P2C API Demo - 暗黑版</p>

        <!-- 进度条 -->
        <div class="progress-bar">
            <div class="step-item active" data-step="1">
                <div class="step-circle">1</div>
                <div class="step-label">填写信息</div>
            </div>
            <div class="step-item" data-step="2">
                <div class="step-circle">2</div>
                <div class="step-label">选择方案</div>
            </div>
            <div class="step-item" data-step="3">
                <div class="step-circle">3</div>
                <div class="step-label">确认报价</div>
            </div>
            <div class="step-item" data-step="4">
                <div class="step-circle">4</div>
                <div class="step-label">支付投保</div>
            </div>
            <div class="step-item" data-step="5">
                <div class="step-circle">5</div>
                <div class="step-label">完成</div>
            </div>
        </div>

        <!-- 步骤1: 填写信息 -->
        <div class="step-container active" id="step1">
            <div class="form-section">
                <h3>📋 投保信息</h3>
                
                <!-- 产品信息 -->
                <div class="product-info">
                    <div>
                        <span class="label">产品名称:</span>
                        <span class="value" id="productName">加载中...</span>
                    </div>
                    <div>
                        <span class="label">产品ID:</span>
                        <span class="value" id="productId">-</span>
                    </div>
                </div>

                <!-- 旅行信息 -->
                <h4 style="margin-bottom: 15px; color: #888;">旅行信息</h4>
                <div class="form-row">
                    <div class="form-group">
                        <label>生效日期<span class="required">*</span></label>
                        <input type="date" id="effectiveDate" required>
                    </div>
                    <div class="form-group">
                        <label>失效日期<span class="required">*</span></label>
                        <input type="date" id="expiryDate" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>旅行类型<span class="required">*</span></label>
                        <select id="travelType" required>
                            <option value="1">单次旅行</option>
                            <option value="2" selected>多次旅行</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>行程类型<span class="required">*</span></label>
                        <select id="tripType" required>
                            <option value="1">商务</option>
                            <option value="2" selected>休闲</option>
                        </select>
                    </div>
                </div>

                <!-- 投保人信息 -->
                <h4 style="margin: 25px 0 15px; color: #888;">投保人信息</h4>
                <div class="form-row">
                    <div class="form-group">
                        <label>姓名<span class="required">*</span></label>
                        <input type="text" id="customerName" placeholder="请输入姓名" required>
                    </div>
                    <div class="form-group">
                        <label>性别<span class="required">*</span></label>
                        <select id="gender" required>
                            <option value="M">男</option>
                            <option value="F">女</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>出生日期<span class="required">*</span></label>
                        <input type="date" id="dateOfBirth" required>
                    </div>
                    <div class="form-group">
                        <label>证件号码<span class="required">*</span></label>
                        <input type="text" id="idNo" placeholder="请输入证件号码" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="email" placeholder="选填">
                    </div>
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="tel" id="mobile" placeholder="选填">
                    </div>
                </div>
            </div>

            <div class="button-group">
                <div></div>
                <button class="btn btn-primary" onclick="submitStep1()">
                    下一步：选择方案
                    <span>→</span>
                </button>
            </div>
        </div>

        <!-- 步骤2: 选择方案 -->
        <div class="step-container" id="step2">
            <div class="form-section">
                <h3>🛡️ 选择保障方案</h3>
                <p style="color: #888; margin-bottom: 20px;">请选择一个适合您的保障方案</p>
                
                <div class="plans-container" id="plansContainer">
                    <!-- 方案将动态加载 -->
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-secondary" onclick="goToStep(1)">
                    <span>←</span>
                    上一步
                </button>
                <button class="btn btn-primary" id="btnStep2" onclick="submitStep2()" disabled>
                    下一步：计算保费
                    <span>→</span>
                </button>
            </div>
        </div>

        <!-- 步骤3: 确认报价 -->
        <div class="step-container" id="step3">
            <div class="form-section">
                <h3>📄 报价确认</h3>
                
                <!-- 保费展示 -->
                <div class="premium-display">
                    <div class="currency">应付总额</div>
                    <div class="amount" id="premiumAmount">€0</div>
                    <div style="font-size: 0.9rem; opacity: 0.8;">
                        保费: <span id="basePremium">€0</span> | 税费: <span id="tax">€0</span>
                    </div>
                </div>

                <!-- 报价摘要 -->
                <div class="quotation-summary">
                    <div class="summary-row">
                        <span>方案名称</span>
                        <span id="summaryPlanName">-</span>
                    </div>
                    <div class="summary-row">
                        <span>保障期间</span>
                        <span id="summaryPeriod">-</span>
                    </div>
                    <div class="summary-row">
                        <span>投保人</span>
                        <span id="summaryCustomer">-</span>
                    </div>
                    <div class="summary-row">
                        <span>保障项目</span>
                        <span id="summaryCoverages">-</span>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-secondary" onclick="goToStep(2)">
                    <span>←</span>
                    上一步
                </button>
                <button class="btn btn-primary" onclick="submitStep3()">
                    确认报价并投保
                    <span>→</span>
                </button>
            </div>
        </div>

        <!-- 步骤4: 支付 -->
        <div class="step-container" id="step4">
            <div class="form-section">
                <h3>💳 支付</h3>
                <p style="color: #888; margin-bottom: 20px;">请选择支付方式完成投保</p>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>支付方式</label>
                        <select id="paymentMethod">
                            <option value="alipay">支付宝</option>
                            <option value="wechat">微信支付</option>
                            <option value="credit">信用卡</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-secondary" onclick="goToStep(3)">
                    <span>←</span>
                    上一步
                </button>
                <button class="btn btn-primary" onclick="submitStep4()">
                    确认支付
                    <span>→</span>
                </button>
            </div>
        </div>

        <!-- 步骤5: 完成 -->
        <div class="step-container" id="step5">
            <div class="success-page">
                <div class="success-icon">🎉</div>
                <h2 style="font-size: 2rem; margin-bottom: 20px;">投保成功！</h2>
                <p style="color: #888; font-size: 1.1rem;">您的保单已成功签发</p>
                
                <div class="policy-info">
                    <p><strong>保单号</strong></p>
                    <div class="policy-no" id="policyNo">-</div>
                    <p style="margin-top: 20px;"><strong>投保单号:</strong> <span id="proposalNo">-</span></p>
                    <p><strong>方案:</strong> <span id="finalPlanName">-</span></p>
                    <p><strong>保费:</strong> <span id="finalPremium">-</span></p>
                    <p><strong>保障期间:</strong> <span id="finalPeriod">-</span></p>
                </div>

                <div style="margin-top: 40px;">
                    <button class="btn btn-primary" onclick="location.reload()">
                        继续投保
                    </button>
                </div>
            </div>
        </div>

        <!-- API日志 -->
        <div class="api-log" id="apiLog" style="display: none;"></div>
    </div>

    <script>
        // API配置
        const CONFIG = {
            BASE_URL: 'https://portal-gw.insuremo.com/platform/api-orchestration-test',
            AUTH_TOKEN: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJpbnN1cmVtby1wb3J0YWwiLCJleHAiOjE3NTI3MzIzOTksInN1YiI6IntcImluc3RhbmNlXCI6XCIxMjM0XCIsXCJ1c2VyXCI6XCJhZG1pbkJpek9wc1wifSIsImlhdCI6MTc0MjE1MTMzNX0.Pd-rT4D5lF3G2bL4Ve6QUZDr1b6F9vqL4V8M2J8F4gA'
        };

        // 全局状态
        const appState = {
            currentStep: 1,
            productId: 375604942, // TRVL01
            productCode: 'TRVL01',
            formData: {},
            selectedPlan: null,
            calculationResult: null,
            proposalNo: null,
            policyNo: null
        };

        // 日志函数
        function log(message, type = 'info') {
            const logDiv = document.getElementById('apiLog');
            logDiv.style.display = 'block';
            
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            
            console.log(`[${type.toUpperCase()}]`, message);
        }

        // API调用
        async function callAPI(endpoint, method = 'GET', data = null) {
            const url = `${CONFIG.BASE_URL}${endpoint}`;
            
            log(`${method} ${endpoint}`, 'info');
            
            const options = {
                method: method,
                headers: {
                    'Authorization': `Bearer ${CONFIG.AUTH_TOKEN}`,
                    'Content-Type': 'application/json'
                }
            };

            if (data && method === 'POST') {
                options.body = JSON.stringify(data);
                log(`Payload: ${JSON.stringify(data, null, 2)}`, 'info');
            }

            try {
                const response = await fetch(url, options);
                const result = await response.json();
                
                log(`Response: ${JSON.stringify(result, null, 2)}`, 'info');

                if (!result.Success) {
                    throw new Error(result.Error?.Message || 'API call failed');
                }

                log(`✅ 成功`, 'success');
                return result.Data;
            } catch (error) {
                log(`❌ 失败: ${error.message}`, 'error');
                throw error;
            }
        }

        // 页面初始化
        async function init() {
            try {
                log('=== 页面初始化 ===', 'info');

                // Step 1: 获取产品列表
                log('Step 1: 获取产品列表', 'info');
                const products = await callAPI('/v1/flow/EUDemoProductList');
                
                // 找到TRVL01产品
                const trvlProduct = products.Products.find(p => p.ProductCode === 'TRVL01');
                if (trvlProduct) {
                    appState.productId = trvlProduct.ProductId;
                    document.getElementById('productName').textContent = trvlProduct.ProductName;
                    document.getElementById('productId').textContent = trvlProduct.ProductId;
                    log(`✅ 已选择产品: ${trvlProduct.ProductName} (ID: ${trvlProduct.ProductId})`, 'success');
                }

                // 设置默认日期
                const today = new Date();
                const nextWeek = new Date(today.getTime() + 7 * 24 * 60 * 60 * 1000);
                document.getElementById('effectiveDate').value = today.toISOString().split('T')[0];
                document.getElementById('expiryDate').value = nextWeek.toISOString().split('T')[0];

                log('✅ 页面初始化完成', 'success');
            } catch (error) {
                log(`❌ 初始化失败: ${error.message}`, 'error');
                alert('页面初始化失败: ' + error.message);
            }
        }

        // 计算年龄
        function calculateAge(birthDate) {
            const today = new Date();
            const birth = new Date(birthDate);
            let age = today.getFullYear() - birth.getFullYear();
            const monthDiff = today.getMonth() - birth.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
                age--;
            }
            return age;
        }

        // 步骤切换
        function goToStep(step) {
            // 更新进度条
            document.querySelectorAll('.step-item').forEach(item => {
                const itemStep = parseInt(item.dataset.step);
                item.classList.remove('active', 'completed');
                if (itemStep < step) {
                    item.classList.add('completed');
                } else if (itemStep === step) {
                    item.classList.add('active');
                }
            });

            // 显示对应步骤
            document.querySelectorAll('.step-container').forEach(container => {
                container.classList.remove('active');
            });
            document.getElementById(`step${step}`).classList.add('active');

            appState.currentStep = step;
        }

        // Step 1: 提交表单
        async function submitStep1() {
            try {
                // 收集表单数据
                appState.formData = {
                    ProductId: appState.productId,
                    EffectiveDate: document.getElementById('effectiveDate').value,
                    ExpiryDate: document.getElementById('expiryDate').value,
                    TravelType: parseInt(document.getElementById('travelType').value),
                    TripType: parseInt(document.getElementById('tripType').value),
                    TravelPolicyType: 'INDI',
                    Customer: {
                        Name: document.getElementById('customerName').value,
                        Gender: document.getElementById('gender').value,
                        DateOfBirth: document.getElementById('dateOfBirth').value,
                        IdNo: document.getElementById('idNo').value,
                        Email: document.getElementById('email').value || undefined,
                        Mobile: document.getElementById('mobile').value || undefined
                    },
                    Travelers: [{
                        Name: document.getElementById('customerName').value,
                        InsuredAge: calculateAge(document.getElementById('dateOfBirth').value),
                        Gender: document.getElementById('gender').value
                    }]
                };

                log('📝 表单数据已收集', 'info');
                log(`ProductId: ${appState.productId}`, 'info');

                // 获取方案列表
                goToStep(2);
                log('Step 2: 获取保险方案', 'info');

                const plans = await callAPI(`/v1/flow/EUDemoPlanList?productId=${appState.productId}`);

                // 显示方案
                const container = document.getElementById('plansContainer');
                container.innerHTML = '';

                plans.Plans.forEach(plan => {
                    // 只显示可用的方案（TRVL01PLATINUM有问题）
                    if (plan.PlanCode === 'TRVL01PLATINUM') {
                        return;
                    }

                    const card = document.createElement('div');
                    card.className = 'plan-card';
                    
                    const coveragesHtml = plan.Coverages?.slice(0, 3).map(c => 
                        `<div>• ${c.ElementName || c.Name}: ${c.SumInsured} ${c.Currency || ''}</div>`
                    ).join('') || '<div>• 全面保障</div>';

                    card.innerHTML = `
                        <h3>${plan.PlanName}</h3>
                        <div class="coverage-count">
                            保障项目: ${plan.Coverages?.length || 0} 项
                        </div>
                        <div class="coverage-list">
                            ${coveragesHtml}
                        </div>
                    `;

                    card.addEventListener('click', () => {
                        document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
                        card.classList.add('selected');
                        appState.selectedPlan = plan;
                        document.getElementById('btnStep2').disabled = false;
                        log(`✅ 已选择方案: ${plan.PlanName} (${plan.PlanCode})`, 'success');
                    });

                    container.appendChild(card);
                });

            } catch (error) {
                log(`❌ 失败: ${error.message}`, 'error');
                alert('操作失败: ' + error.message);
                goToStep(1);
            }
        }

        // Step 2: 提交选择方案
        async function submitStep2() {
            if (!appState.selectedPlan) {
                alert('请选择一个保障方案');
                return;
            }

            try {
                // 计算保费
                log('Step 3: 计算保费', 'info');

                const payload = {
                    ...appState.formData,
                    ProductId: parseInt(appState.productId),
                    ProductCode: 'TRVL01',
                    PlanCode: appState.selectedPlan.PlanCode
                };

                // 验证ProductId
                if (!payload.ProductId || isNaN(payload.ProductId)) {
                    throw new Error('ProductId无效: ' + payload.ProductId);
                }

                log(`📤 Payload: ProductId=${payload.ProductId}, PlanCode=${payload.PlanCode}`, 'info');

                appState.calculationResult = await callAPI('/v1/flow/EUDemoTRVL01Calculate', 'POST', payload);

                log(`✅ 保费计算成功: ${appState.calculationResult.TotalPremium} ${appState.calculationResult.Currency}`, 'success');

                // 显示报价
                goToStep(3);
                renderQuotation();

            } catch (error) {
                log(`❌ 计算失败: ${error.message}`, 'error');
                alert('保费计算失败: ' + error.message);
            }
        }

        // 渲染报价
        function renderQuotation() {
            const data = appState.calculationResult;

            // 显示保费
            document.getElementById('premiumAmount').textContent = 
                `${data.Currency === 'EUR' ? '€' : '$'}${data.TotalPremium}`;
            document.getElementById('basePremium').textContent = 
                `${data.Currency === 'EUR' ? '€' : '$'}${data.Premium}`;
            document.getElementById('tax').textContent = 
                `${data.Currency === 'EUR' ? '€' : '$'}${data.Tax || 0}`;

            // 显示摘要
            document.getElementById('summaryPlanName').textContent = data.PlanName;
            document.getElementById('summaryPeriod').textContent = 
                `${data.EffectiveDate} 至 ${data.ExpiryDate}`;
            document.getElementById('summaryCustomer').textContent = data.Customer.Name;
            document.getElementById('summaryCoverages').textContent = 
                `${data.Coverages?.length || 0} 项保障`;
        }

        // Step 3: 确认报价
        async function submitStep3() {
            try {
                // 保存提案
                log('Step 4: 保存提案', 'info');

                const savePayload = {
                    ...appState.calculationResult,
                    ProductId: appState.productId
                };

                const saveResult = await callAPI('/v1/flow/EUDemoTRVL01SaveProposal', 'POST', savePayload);
                appState.proposalNo = saveResult.ProposalNo;

                log(`✅ 提案号: ${appState.proposalNo}`, 'success');

                // 绑定提案
                log('Step 5: 绑定提案', 'info');

                await callAPI('/v1/flow/EUDemoTRVL01BindProposal', 'POST', {
                    ProposalNo: appState.proposalNo
                });

                log(`✅ 提案已绑定`, 'success');

                // 进入支付步骤
                goToStep(4);

            } catch (error) {
                log(`❌ 失败: ${error.message}`, 'error');
                alert('操作失败: ' + error.message);
            }
        }

        // Step 4: 支付
        async function submitStep4() {
            try {
                // 模拟支付
                log('Step 6: 支付回调', 'info');

                const paymentResult = await callAPI('/v1/flow/EUDemoTRVL01PaymentCallback', 'POST', {
                    ProposalNo: appState.proposalNo,
                    PaymentStatus: 'SUCCESS',
                    PaymentReference: 'PAY' + Date.now()
                });

                appState.policyNo = paymentResult.PolicyNo;

                log(`✅ 保单号: ${appState.policyNo}`, 'success');

                // 显示成功页面
                goToStep(5);
                renderSuccess();

            } catch (error) {
                log(`❌ 支付失败: ${error.message}`, 'error');
                alert('支付失败: ' + error.message);
            }
        }

        // 渲染成功页面
        function renderSuccess() {
            const data = appState.calculationResult;

            document.getElementById('policyNo').textContent = appState.policyNo || 'PO' + Date.now();
            document.getElementById('proposalNo').textContent = appState.proposalNo;
            document.getElementById('finalPlanName').textContent = data.PlanName;
            document.getElementById('finalPremium').textContent = 
                `${data.Currency === 'EUR' ? '€' : '$'}${data.TotalPremium}`;
            document.getElementById('finalPeriod').textContent = 
                `${data.EffectiveDate} 至 ${data.ExpiryDate}`;
        }

        // 页面加载时初始化
        window.onload = init;
    </script>
</body>
</html>
