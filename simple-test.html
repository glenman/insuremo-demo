<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>最简单的API测试</title>
</head>
<body style="background: #000; color: #0f0; font-family: monospace; padding: 20px;">
    <h1>API连接测试</h1>
    <button onclick="test1()" style="padding: 10px 20px; font-size: 16px;">测试连接</button>
    <div id="log" style="margin-top: 20px; white-space: pre-wrap;"></div>
    
    <script>
        const log = msg => {
            document.getElementById('log').innerHTML += msg + '\n';
            console.log(msg);
        };

        async function test1() {
            const url = 'https://portal-gw.insuremo.com/platform/api-orchestration-test/v1/flow/EUDemoProductList';
            const token = 'MOATkM3zLB-wAfktz6zd7nY5Z3dgTO1N';
            
            log('=== 开始测试 ===');
            log('URL: ' + url);
            log('Token: ' + token.substring(0, 10) + '...');
            log('');
            
            try {
                log('📡 发送请求...');
                const resp = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                log('✅ 收到响应');
                log('状态码: ' + resp.status);
                log('状态文本: ' + resp.statusText);
                log('');
                
                const text = await resp.text();
                log('响应长度: ' + text.length + ' 字节');
                
                try {
                    const json = JSON.parse(text);
                    log('✅ JSON解析成功');
                    log('Success: ' + json.Success);
                    if (json.Success) {
                        log('产品数量: ' + json.Data.Products.length);
                        log('✅✅✅ API完全正常！');
                    } else {
                        log('❌ API返回错误: ' + JSON.stringify(json.Error));
                    }
                } catch (e) {
                    log('❌ JSON解析失败');
                    log('前100字符: ' + text.substring(0, 100));
                }
                
            } catch (error) {
                log('❌ 请求失败');
                log('错误类型: ' + error.name);
                log('错误信息: ' + error.message);
                
                if (error.name === 'TypeError') {
                    log('');
                    log('💡 可能的原因:');
                    log('1. 网络连接问题');
                    log('2. CORS策略阻止');
                    log('3. 防火墙/代理拦截');
                }
            }
        }
        
        // 页面加载后自动测试
        window.onload = () => {
            log('页面加载完成，3秒后自动测试...');
            setTimeout(test1, 3000);
        };
    </script>
</body>
</html>
